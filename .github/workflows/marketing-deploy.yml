name: Deploy Marketing Site

# Builds the Astro marketing site AND the VitePress docs, then deploys the
# combined bundle to Cloudflare Pages (project: protoagent-marketing →
# https://agent.protolabs.studio). The docs are served at /docs — built with
# DOCS_BASE=/docs/ and folded into the Astro output's dist/docs before deploy,
# so one Cloudflare Pages project serves both the landing page and the docs.
#
# Requires repo/org secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID.
# The GitHub Pages docs workflow (docs.yml) still publishes to /protoAgent/;
# the two coexist via the DOCS_BASE env.

on:
  push:
    branches: [main]
    paths:
      - 'sites/marketing/**'
      - 'docs/**'
      - '.github/workflows/marketing-deploy.yml'
  workflow_dispatch:

concurrency:
  group: marketing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: namespace-profile-protolabs-linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # --- Marketing site (Astro) ---
      - name: Build marketing site
        run: |
          npm install
          npm run build
        working-directory: sites/marketing

      # --- Docs (VitePress) served at /docs ---
      - name: Build docs (base /docs/)
        run: |
          npm ci
          DOCS_BASE=/docs/ npm run docs:build

      - name: Fold docs into the marketing bundle at /docs
        run: |
          rm -rf sites/marketing/dist/docs
          mkdir -p sites/marketing/dist/docs
          cp -R docs/.vitepress/dist/. sites/marketing/dist/docs/

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=protoagent-marketing --branch=main
        working-directory: sites/marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
