id: broker
name: Broker (paper)
version: 0.1.0
description: >-
  Gated PAPER execution for protoTrader (Slice 6) — place/inspect simulated orders
  behind the full safety stack: a mandate (master switch + per-order/exposure/daily
  limits, OFF by default), a filesystem kill-switch, per-order human approval (the
  task pauses until the operator types APPROVE), and an append-only audit ledger.
  `mode: live` is deliberately NOT implemented — this cannot move real money. Arm
  it by writing `broker_mandate.yaml` (enabled: true). Disable with
  `plugins: { disabled: [broker] }`.
enabled: true
requires_env: []
