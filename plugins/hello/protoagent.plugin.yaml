id: hello
name: Hello Plugin
version: 0.1.0
description: >-
  A minimal example plugin: contributes one tool (`hello`) and bundles one
  SKILL.md skill. Copy this as a starting point. Shipped disabled — enable it
  with `plugins: { enabled: [hello] }` in config (or set `enabled: true` here
  in your own copy).
enabled: false
# Declarative only (not yet enforced) — surfaced in the console for transparency.
capabilities:
  network: []
  filesystem: none

# Plugin config (ADR 0019) — the plugin claims a top-level `hello` config section.
# These render in System → Settings (group "Hello") and round-trip through the
# generic settings surface; `api_key` is routed to the gitignored secrets.yaml.
# A fork gets config + secrets + Settings for its plugin with no core edit.
config_section: hello
config:
  greeting: "Hello"
  api_key: ""
secrets: [api_key]
settings:
  - { key: greeting, label: "Greeting word", type: string, description: "Prefix used by the hello tool." }
  - { key: api_key, label: "Example API key", type: secret, description: "Demo secret — stored in secrets.yaml, never the tracked YAML." }

# Console surfaces (ADR 0026) — a left-rail icon opening a full view (an iframe of
# a page the plugin serves). The console reads this from /api/runtime/status and
# renders the rail icon + iframe — no console rebuild. `icon` is a lucide-react
# name; `path` is served by this plugin's router (see __init__.py `/view`).
views:
  - { id: hello, label: "Hello", icon: "Sparkles", path: "/plugins/hello/view" }
